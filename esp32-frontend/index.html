<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Health Monitor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1 id="patientName">Health Monitor</h1>
      <span class="subtitle">Real-time Health Intelligence</span>
    </header>

    <!-- Overall Status -->
    <section id="statusCard" class="card status-card">
      Loading status...
    </section>

    <!-- Vitals -->
    <section class="vitals-grid">
      <div class="card vital-card">
        <span class="label"> Heart Rate</span>
        <span id="hr" class="value">-- bpm</span>
      </div>
      <div class="card vital-card">
        <span class="label"> SpO₂</span>
        <span id="spo2" class="value">-- %</span>
      </div>
      <div class="card vital-card">
        <span class="label"> Temperature</span>
        <span id="temp" class="value">-- °C</span>
      </div>
    </section>

    <!-- Sensor Fusion -->
    <section class="fusion-section">
      <h2>Health Insights</h2>
      <div id="fusion" class="fusion-cards">
        <!-- dynamic -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span id="updated">Last updated: --</span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
