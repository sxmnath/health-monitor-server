<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalWatch — Ward Overview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --bg2: #EDE8DC;
    --card: #FDFBF7;
    --dark: #1A1A18;
    --ink: #2C2C28;
    --muted: #7A7870;
    --accent: #C8A96E;
    --accent2: #8BAF7C;
    --danger: #C4614A;
    --warn: #D4894A;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 2px 24px rgba(0,0,0,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8a98a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events:none; z-index:0;
  }

  .layout { position:relative; z-index:1; display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 220px; flex-shrink:0;
    background: var(--dark);
    padding: 28px 0;
    display:flex; flex-direction:column;
    position: sticky; top:0; height:100vh;
  }
  .logo {
    padding: 0 24px 28px;
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: #fff;
    letter-spacing: -0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 16px;
  }
  .logo span { color: var(--accent); }
  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-label { font-size:10px; font-weight:600; letter-spacing:1.5px; color:rgba(255,255,255,0.3); padding: 8px 12px 6px; text-transform:uppercase; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding: 10px 12px; border-radius:8px;
    font-size:13.5px; font-weight:500; color:rgba(255,255,255,0.55);
    cursor:pointer; transition:all 0.15s; text-decoration:none;
  }
  .nav-item:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85); }
  .nav-item.active { background:rgba(200,169,110,0.15); color:var(--accent); }
  .nav-item svg { width:16px; height:16px; flex-shrink:0; opacity:0.7; }
  .nav-item.active svg { opacity:1; }
  .sidebar-footer {
    margin-top:auto; padding:16px 12px 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* MAIN */
  .main { flex:1; padding: 32px 40px; }
  .topbar {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:32px;
  }
  .topbar-title { font-family:'DM Serif Display',serif; font-size:28px; color:var(--ink); }
  .topbar-title span { color:var(--muted); font-size:16px; font-family:'DM Sans',sans-serif; font-weight:400; margin-left:12px; }
  .topbar-actions { display:flex; align-items:center; gap:12px; }
  .time-badge {
    background: var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 16px;
    font-size:13px; color:var(--muted); font-weight:500;
    display:flex; align-items:center; gap:8px;
  }
  .dot-live { width:7px; height:7px; border-radius:50%; background:#8BAF7C; animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }

  /* STATS ROW */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:20px 22px;
    box-shadow:var(--shadow);
  }
  .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .stat-value { font-family:'DM Serif Display',serif; font-size:32px; color:var(--ink); }
  .stat-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .stat-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }

  /* PATIENT GRID */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title { font-family:'DM Serif Display',serif; font-size:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }

  .patient-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:22px;
    box-shadow:var(--shadow); cursor:pointer;
    transition:transform 0.18s, box-shadow 0.18s;
    text-decoration:none; color:inherit; display:block;
    position:relative; overflow:hidden;
  }
  .patient-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--accent2); border-radius:16px 16px 0 0;
    transition:height 0.2s;
  }
  .patient-card.critical::before { background:var(--danger); }
  .patient-card.warning::before { background:var(--warn); }
  .patient-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.1); }

  .card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
  .card-info { }
  .pid-badge {
    display:inline-flex; align-items:center;
    background:var(--dark); color:var(--accent);
    font-size:11px; font-weight:700; letter-spacing:0.5px;
    padding:3px 10px; border-radius:20px; margin-bottom:8px;
  }
  .card-name { font-family:'DM Serif Display',serif; font-size:19px; color:var(--ink); }
  .card-detail { font-size:12px; color:var(--muted); margin-top:2px; }
  .status-pill {
    font-size:11px; font-weight:600; padding:5px 12px; border-radius:20px;
    display:inline-flex; align-items:center; gap:5px;
  }
  .status-normal { background:rgba(139,175,124,0.15); color:#5A8A4A; }
  .status-warning { background:rgba(212,137,74,0.15); color:#B86A20; }
  .status-critical { background:rgba(196,97,74,0.15); color:#C4614A; }
  .status-offline { background:rgba(120,120,120,0.12); color:#888; }

  .vitals-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .vital-chip {
    background:var(--bg2); border-radius:10px; padding:10px 12px;
    text-align:center;
  }
  .vital-chip-label { font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); font-weight:600; }
  .vital-chip-value { font-size:17px; font-weight:600; color:var(--ink); margin-top:2px; }
  .vital-chip-value.danger { color:var(--danger); }
  .vital-chip-value.warn { color:var(--warn); }
  .vital-chip-value.na { color:var(--muted); font-size:13px; }

  .card-footer { margin-top:14px; display:flex; align-items:center; justify-content:space-between; }
  .card-room { font-size:12px; color:var(--muted); }
  .view-btn {
    font-size:12px; font-weight:600; color:var(--accent);
    display:flex; align-items:center; gap:4px;
  }
  .view-btn svg { width:14px; height:14px; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state h3 { font-family:'DM Serif Display',serif; font-size:22px; color:var(--ink); margin-bottom:8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
</style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Vital<span>Watch</span></div>
    <div class="nav-section">
      <div class="nav-label">Monitor</div>
      <a href="patients.html" class="nav-item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Ward Overview
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Settings</div>
      <div class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Alerts Config
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Ward Overview <span id="wardSubtitle"></span></div>
      </div>
      <div class="topbar-actions">
        <div class="time-badge"><div class="dot-live"></div><span id="liveClock"></span></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Patients</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">Registered devices</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Normal</div>
        <div class="stat-value" id="statNormal" style="color:var(--accent2)">—</div>
        <div class="stat-sub"><span class="stat-dot" style="background:var(--accent2)"></span>All vitals stable</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Attention</div>
        <div class="stat-value" id="statWarn" style="color:var(--warn)">—</div>
        <div class="stat-sub"><span class="stat-dot" style="background:var(--warn)"></span>Review recommended</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Critical</div>
        <div class="stat-value" id="statCrit" style="color:var(--danger)">—</div>
        <div class="stat-sub"><span class="stat-dot" style="background:var(--danger)"></span>Immediate attention</div>
      </div>
    </div>

    <!-- PATIENT GRID -->
    <div class="section-header">
      <div class="section-title">Patients</div>
    </div>
    <div class="grid" id="patientGrid">
      <div class="empty-state">
        <h3>Waiting for patients…</h3>
        <p>Connect an ESP32 device to begin monitoring</p>
      </div>
    </div>
  </main>
</div>

<script>
// --- Clock ---
function updateClock() {
  document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// --- Patient info from localStorage (synced with dashboard) ---
function getPatientInfo(pid) {
  try { return JSON.parse(localStorage.getItem('patientInfo_'+pid)) || {}; } catch { return {}; }
}

// --- Determine status ---
function getStatus(data) {
  const {heartRate, spo2, temperature} = data;
  if (spo2 === -1 || spo2 == null) return 'offline';
  const tempC = parseFloat(temperature);
  if (spo2 < 90 || heartRate > 130 || heartRate < 45 || tempC > 39.5) return 'critical';
  if (spo2 < 95 || heartRate > 110 || heartRate < 55 || tempC > 38.5 || tempC < 35.5) return 'warning';
  return 'normal';
}

function celsiusToF(c) { return (c * 9/5 + 32).toFixed(1); }

function renderCard(patient) {
  const info = getPatientInfo(patient.patient_id);
  const data = patient.latestData || {};
  const status = data.heartRate ? getStatus(data) : 'offline';
  const displayName = info.name || patient.name || patient.patient_id;
  const hr = data.heartRate;
  const spo2 = data.spo2;
  const temp = data.temperature;

  const statusMap = {
    normal: ['Normal','status-normal'],
    warning: ['Attention','status-warning'],
    critical: ['Critical','status-critical'],
    offline: ['Offline','status-offline'],
  };
  const [statusLabel, statusClass] = statusMap[status];

  const hrClass = (hr > 110 || hr < 55) ? 'danger' : '';
  const spo2Class = (spo2 !== -1 && spo2 < 95) ? 'danger' : '';
  const tempF = temp ? celsiusToF(temp) : null;
  const tempClass = (temp > 39.5 || temp < 35.5) ? 'danger' : (temp > 38.5 ? 'warn' : '');

  const hrDisplay = hr ? `${Math.round(hr)}` : '—';
  const spo2Display = (spo2 === -1 || spo2 == null) ? '<span class="na">N/C</span>' : `${spo2}%`;
  const tempDisplay = tempF ? `${tempF}°F` : '—';

  return `<a href="index.html?id=${patient.patient_id}" class="patient-card ${status === 'critical' ? 'critical' : status === 'warning' ? 'warning' : ''}">
    <div class="card-top">
      <div class="card-info">
        <div class="pid-badge">${patient.patient_id}</div>
        <div class="card-name">${displayName}</div>
        <div class="card-detail">${info.age ? info.age+' yrs' : ''}${info.age && info.bloodType ? ' · ' : ''}${info.bloodType || ''}${info.roomNo ? ' · Room '+info.roomNo : ''}</div>
      </div>
      <span class="status-pill ${statusClass}">${statusLabel}</span>
    </div>
    <div class="vitals-grid">
      <div class="vital-chip">
        <div class="vital-chip-label">Heart Rate</div>
        <div class="vital-chip-value ${hrClass}">${hrDisplay}<small style="font-size:11px;font-weight:400"> bpm</small></div>
      </div>
      <div class="vital-chip">
        <div class="vital-chip-label">SpO₂</div>
        <div class="vital-chip-value ${spo2Class}">${spo2Display}</div>
      </div>
      <div class="vital-chip">
        <div class="vital-chip-label">Temp</div>
        <div class="vital-chip-value ${tempClass}">${tempDisplay}</div>
      </div>
    </div>
    <div class="card-footer">
      <span class="card-room">${info.roomNo ? 'Room '+info.roomNo : (patient.deviceId || 'Device unassigned')}</span>
      <span class="view-btn">View Dashboard <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
    </div>
  </a>`;
}

async function loadPatients() {
  let patients = [];
  try {
    const r = await fetch('/patients');
    if (r.ok) patients = await r.json();
  } catch(e) {
    // Demo fallback
    patients = [
      { patient_id:'P101', name:'Patient 1', deviceId:'ESP32_01', latestData:{heartRate:75, spo2:98, temperature:37.0} },
      { patient_id:'P102', name:'Patient 2', deviceId:'ESP32_02', latestData:{heartRate:110, spo2:93, temperature:38.2} },
      { patient_id:'P103', name:'Patient 3', deviceId:'ESP32_03', latestData:{heartRate:55, spo2:-1, temperature:36.8} },
    ];
  }

  const grid = document.getElementById('patientGrid');
  if (!patients.length) return;

  let normal=0, warn=0, crit=0;
  patients.forEach(p => {
    const s = (p.latestData?.heartRate) ? getStatus(p.latestData) : 'offline';
    if (s==='normal') normal++;
    else if (s==='warning') warn++;
    else if (s==='critical') crit++;
  });

  document.getElementById('statTotal').textContent = patients.length;
  document.getElementById('statNormal').textContent = normal;
  document.getElementById('statWarn').textContent = warn;
  document.getElementById('statCrit').textContent = crit;
  document.getElementById('wardSubtitle').textContent = `${patients.length} patient${patients.length!==1?'s':''} monitored`;

  grid.innerHTML = patients.map(renderCard).join('');
}

loadPatients();
setInterval(loadPatients, 10000);
</script>
</body>
</html>
