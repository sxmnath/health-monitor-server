<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>healthMonitor — My Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ── Profile-page-only styles ─────────────────────────────────────── */
    .profile-outer {
      padding: 32px 28px 48px;
      max-width: 780px;
    }

    .profile-page-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    /* Hero avatar strip */
    .profile-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .avatar-ring {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--sidebar-bg);
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .avatar-img:hover { border-color: var(--sidebar-accent); }
    .avatar-img i { font-size: 2rem; color: var(--sidebar-accent); }
    .avatar-img img { width: 100%; height: 100%; object-fit: cover; }

    .avatar-edit-badge {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--sidebar-bg);
      border: 2px solid var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .avatar-edit-badge i { font-size: 0.6rem; color: var(--sidebar-accent); }

    .hero-info { flex: 1; }
    .hero-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .hero-email {
      font-size: 0.84rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(232,180,203,0.18);
      color: #a0607a;
    }

    .hero-meta {
      margin-left: auto;
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .hero-meta strong { display: block; color: var(--text-secondary); font-weight: 600; }

    /* Cards */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .card-title i { color: var(--sidebar-accent); }

    .btn-edit-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }
    .btn-edit-toggle:hover { opacity: 0.8; }

    /* View rows */
    .view-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .view-row:last-child { border-bottom: none; }
    .vr-label { color: var(--text-secondary); font-weight: 500; }
    .vr-val   { color: var(--text-primary); font-weight: 600; }

    /* Edit form inside card */
    .edit-form { padding: 20px; display: none; flex-direction: column; gap: 14px; }
    .edit-form.open { display: flex; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input-wrap { position: relative; }
    .input-wrap > i.input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 0.8rem; color: var(--text-muted); pointer-events: none;
    }
    .field-group input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light); }
    .field-group input.has-error { border-color: var(--critical); box-shadow: 0 0 0 3px var(--critical-light); }
    .field-error-msg {
      font-size: 0.75rem;
      color: var(--critical);
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 14px;
    }

    .pw-toggle-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.82rem; padding: 4px;
      transition: color 0.15s;
    }
    .pw-toggle-btn:hover { color: var(--text-secondary); }

    /* Strength bar */
    .pw-strength { margin-top: 5px; display: none; }
    .pw-strength-bar {
      height: 3px; width: 100%; border-radius: 99px;
      background: var(--border); overflow: hidden;
    }
    .pw-strength-fill {
      height: 100%; width: 0; border-radius: 99px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .pw-strength-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    /* Form actions row */
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-save {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      background: var(--sidebar-bg); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover    { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }

    .btn-cancel {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--surface-2); }

    /* Toast */
    .profile-toast {
      position: fixed;
      bottom: 28px; right: 28px;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 0.86rem; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      transform: translateY(20px); opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }
    .profile-toast.show { transform: translateY(0); opacity: 1; }
    .profile-toast.success {
      background: var(--normal-light); color: var(--normal);
      border: 1px solid #a8e6c4;
    }
    .profile-toast.error {
      background: var(--critical-light); color: var(--critical);
      border: 1px solid var(--hr-mid);
    }

    /* Avatar upload UI */
    #avatarInput { display: none; }

    .avatar-preview-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .avatar-preview-thumb {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--sidebar-bg);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar-preview-thumb i { font-size: 1.3rem; color: var(--sidebar-accent); }
    .avatar-preview-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .avatar-upload-actions { display: flex; flex-direction: column; gap: 5px; }
    .btn-upload-trigger {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--blue); background: var(--blue-light);
      border: 1px solid var(--blue-mid); border-radius: var(--radius-sm);
      padding: 6px 12px; cursor: pointer; font-family: var(--font);
      transition: opacity 0.15s;
    }
    .btn-upload-trigger:hover { opacity: 0.8; }
    .btn-remove-avatar {
      display: none; /* shown only when image exists */
      align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 500;
      color: var(--critical); background: none;
      border: none; cursor: pointer; font-family: var(--font);
      transition: opacity 0.15s; padding: 0;
    }
    .btn-remove-avatar.visible { display: inline-flex; }
    .btn-remove-avatar:hover { opacity: 0.7; }
    .avatar-hint { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <button class="sidebar-collapse-btn" id="sidebarToggle" title="Collapse sidebar">
          <i class="fa-solid fa-heart-pulse logo-icon"></i>
          <span class="logo-text">healthMonitor</span>
          <i class="fa-solid fa-chevron-left collapse-arrow"></i>
        </button>
        <span class="sidebar-tagline">Real-time patient monitoring</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-item" title="Ward Overview">
          <i class="fa-solid fa-building-columns"></i>
          <span>Ward Overview</span>
        </a>
        <a href="/profile" class="nav-item active" title="My Profile">
          <i class="fa-solid fa-circle-user"></i>
          <span>My Profile</span>
        </a>
      </nav>
      <div class="sidebar-bottom">
        <button class="nav-item logout-btn" onclick="logout()" title="Logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Topbar -->
      <div class="topbar">
        <div class="breadcrumb-row">
          <a href="/" class="back-link">
            <i class="fa-solid fa-chevron-left"></i> Ward Overview
          </a>
          <i class="fa-solid fa-chevron-right bc-sep"></i>
          <span class="bc-current">My Profile</span>
        </div>
        <div class="topbar-meta">
          <div class="topbar-user">
            <span class="topbar-greeting">Hello, <strong id="topbarUserName">…</strong></span>
            <a href="/profile" class="topbar-avatar" id="topbarAvatar" title="My profile">
              <i class="fa-solid fa-user-doctor"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Page content -->
      <div class="profile-outer">
        <h1 class="profile-page-title">My Profile</h1>

        <!-- ── Hero ─────────────────────────────────────────────────── -->
        <div class="profile-hero">
          <div class="avatar-ring">
            <div class="avatar-img" id="heroAvatar" title="Change photo" onclick="document.getElementById('avatarInput').click()">
              <i class="fa-solid fa-user-doctor" id="heroAvatarIcon"></i>
            </div>
            <div class="avatar-edit-badge" onclick="document.getElementById('avatarInput').click()">
              <i class="fa-solid fa-camera"></i>
            </div>
          </div>
          <div class="hero-info">
            <div class="hero-name" id="heroName">—</div>
            <div class="hero-email" id="heroEmail">—</div>
            <span class="role-badge" id="heroRole">
              <i class="fa-solid fa-shield-halved"></i>
              <span id="heroRoleText">—</span>
            </span>
          </div>
          <div class="hero-meta">
            <strong>Member since</strong>
            <span id="heroSince">—</span>
            <br><br>
            <strong>Last login</strong>
            <span id="heroLastLogin">—</span>
          </div>
        </div>

        <!-- ── Profile info card ─────────────────────────────────── -->
        <div class="profile-card">
          <div class="card-header">
            <span class="card-title">
              <i class="fa-solid fa-id-card"></i> Profile Information
            </span>
            <button class="btn-edit-toggle" id="infoEditToggle" onclick="toggleInfoEdit()">
              <i class="fa-solid fa-pen"></i> Edit
            </button>
          </div>

          <!-- View mode -->
          <div id="infoView">
            <div class="view-row">
              <span class="vr-label">Full Name</span>
              <span class="vr-val" id="viewName">—</span>
            </div>
            <div class="view-row">
              <span class="vr-label">Email Address</span>
              <span class="vr-val" id="viewEmail">—</span>
            </div>
            <div class="view-row">
              <span class="vr-label">Role</span>
              <span class="vr-val" id="viewRole">—</span>
            </div>
          </div>

          <!-- Edit mode (profile picture section inside the card) -->
          <div class="avatar-preview-row" id="avatarRow" style="display:none">
            <div class="avatar-preview-thumb" id="avatarThumb">
              <i class="fa-solid fa-user-doctor"></i>
            </div>
            <div class="avatar-upload-actions">
              <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/webp,image/gif" />
              <button class="btn-upload-trigger" type="button" onclick="document.getElementById('avatarInput').click()">
                <i class="fa-solid fa-arrow-up-from-bracket"></i> Upload Photo
              </button>
              <button class="btn-remove-avatar" id="removeAvatarBtn" type="button" onclick="removeAvatar()">
                <i class="fa-solid fa-trash-can"></i> Remove photo
              </button>
              <span class="avatar-hint">PNG, JPG or WebP · Max 2 MB</span>
            </div>
          </div>

          <div class="edit-form" id="infoForm">
            <div class="field-group">
              <label for="inputName">Full Name</label>
              <div class="input-wrap">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" id="inputName" placeholder="Dr. Jane Smith" autocomplete="name" />
              </div>
              <span class="field-error-msg" id="nameErr"></span>
            </div>
            <div class="field-group">
              <label for="inputEmail">Email Address</label>
              <div class="input-wrap">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="inputEmail" placeholder="you@hospital.com" autocomplete="email" />
              </div>
              <span class="field-error-msg" id="emailErr"></span>
            </div>
            <div class="form-actions">
              <button class="btn-cancel" type="button" onclick="cancelInfoEdit()">Cancel</button>
              <button class="btn-save" type="button" id="infoSaveBtn" onclick="saveProfile()">
                <i class="fa-solid fa-check"></i> Save Changes
              </button>
            </div>
          </div>
        </div>

        <!-- ── Password card ──────────────────────────────────────── -->
        <div class="profile-card">
          <div class="card-header">
            <span class="card-title">
              <i class="fa-solid fa-lock"></i> Change Password
            </span>
            <button class="btn-edit-toggle" id="pwEditToggle" onclick="togglePwEdit()">
              <i class="fa-solid fa-pen"></i> Change
            </button>
          </div>

          <!-- View mode -->
          <div id="pwView">
            <div class="view-row" style="border-bottom:none">
              <span class="vr-label">Password</span>
              <span class="vr-val" style="letter-spacing:0.2em; color:var(--text-muted)">••••••••</span>
            </div>
          </div>

          <!-- Edit mode -->
          <div class="edit-form" id="pwForm">
            <div class="field-group">
              <label for="inputCurrentPw">Current Password</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="inputCurrentPw" placeholder="Your current password" autocomplete="current-password" />
                <button class="pw-toggle-btn" type="button" onclick="togglePw('inputCurrentPw','iconCurrentPw')">
                  <i class="fa-regular fa-eye" id="iconCurrentPw"></i>
                </button>
              </div>
              <span class="field-error-msg" id="currentPwErr"></span>
            </div>
            <div class="field-group">
              <label for="inputNewPw">New Password</label>
              <div class="input-wrap">
                <i class="fa-solid fa-key input-icon"></i>
                <input type="password" id="inputNewPw" placeholder="Min. 8 characters"
                       autocomplete="new-password" oninput="updateStrength(this.value)" />
                <button class="pw-toggle-btn" type="button" onclick="togglePw('inputNewPw','iconNewPw')">
                  <i class="fa-regular fa-eye" id="iconNewPw"></i>
                </button>
              </div>
              <div class="pw-strength" id="pwStrengthWrap">
                <div class="pw-strength-bar">
                  <div class="pw-strength-fill" id="pwStrengthFill"></div>
                </div>
                <div class="pw-strength-label" id="pwStrengthLabel"></div>
              </div>
              <span class="field-error-msg" id="newPwErr"></span>
            </div>
            <div class="field-group">
              <label for="inputConfirmPw">Confirm New Password</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="inputConfirmPw" placeholder="Repeat new password" autocomplete="new-password" />
                <button class="pw-toggle-btn" type="button" onclick="togglePw('inputConfirmPw','iconConfirmPw')">
                  <i class="fa-regular fa-eye" id="iconConfirmPw"></i>
                </button>
              </div>
              <span class="field-error-msg" id="confirmPwErr"></span>
            </div>
            <div class="form-actions">
              <button class="btn-cancel" type="button" onclick="cancelPwEdit()">Cancel</button>
              <button class="btn-save" type="button" id="pwSaveBtn" onclick="savePassword()">
                <i class="fa-solid fa-check"></i> Update Password
              </button>
            </div>
          </div>
        </div>

      </div><!-- /profile-outer -->
    </main>
  </div>

  <!-- Toast -->
  <div class="profile-toast" id="toast"></div>

  <script src="auth.js"></script>
  <script>
    // ── Auth guard ─────────────────────────────────────────────────────────
    if (!protectPage()) throw new Error("redirect");

    // ── State ──────────────────────────────────────────────────────────────
    let currentUser    = null;
    let pendingAvatar  = undefined; // undefined = no change, null = remove, string = new dataURL

    // ── Utilities ──────────────────────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString(undefined, {
        year: "numeric", month: "short", day: "numeric"
      });
    }

    function fmtDateTime(iso) {
      if (!iso) return "Never";
      return new Date(iso).toLocaleString(undefined, {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function cap(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : "—";
    }

    function showToast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.className = `profile-toast ${type}`;
      t.innerHTML = `<i class="fa-solid fa-${type === "success" ? "circle-check" : "circle-exclamation"}"></i> ${msg}`;
      t.classList.add("show");
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
    }

    function setFieldErr(inputId, errId, msg) {
      const el = document.getElementById(inputId);
      const er = document.getElementById(errId);
      if (msg) {
        el?.classList.add("has-error");
        if (er) er.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
      } else {
        el?.classList.remove("has-error");
        if (er) er.textContent = "";
      }
    }

    function clearFieldErrs(...pairs) {
      pairs.forEach(([inp, err]) => setFieldErr(inp, err, ""));
    }

    // ── Render user into all display elements ──────────────────────────────
    function renderUser(u) {
      currentUser = u;

      // Topbar
      const topName = document.getElementById("topbarUserName");
      if (topName) topName.textContent = u.name ? u.name.split(" ")[0] : u.email;
      const topAvatar = document.getElementById("topbarAvatar");
      if (topAvatar && u.profileImage) {
        topAvatar.innerHTML = `<img src="${u.profileImage}" alt="${u.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      }

      // Hero
      document.getElementById("heroName").textContent      = u.name  || "—";
      document.getElementById("heroEmail").textContent     = u.email || "—";
      document.getElementById("heroRoleText").textContent  = cap(u.role);
      document.getElementById("heroSince").textContent     = fmtDate(u.createdAt);
      document.getElementById("heroLastLogin").textContent = fmtDateTime(u.lastLogin);

      const heroAvatar = document.getElementById("heroAvatar");
      if (u.profileImage) {
        heroAvatar.innerHTML = `<img src="${u.profileImage}" alt="${u.name}" />`;
      } else {
        heroAvatar.innerHTML = `<i class="fa-solid fa-user-doctor" id="heroAvatarIcon"></i>`;
      }

      // View rows
      document.getElementById("viewName").textContent  = u.name  || "—";
      document.getElementById("viewEmail").textContent = u.email || "—";
      document.getElementById("viewRole").textContent  = cap(u.role);

      // Edit inputs pre-filled
      document.getElementById("inputName").value  = u.name  || "";
      document.getElementById("inputEmail").value = u.email || "";

      // Avatar thumb in edit mode
      const thumb = document.getElementById("avatarThumb");
      if (u.profileImage) {
        thumb.innerHTML = `<img src="${u.profileImage}" alt="" />`;
        document.getElementById("removeAvatarBtn").classList.add("visible");
      } else {
        thumb.innerHTML = `<i class="fa-solid fa-user-doctor"></i>`;
        document.getElementById("removeAvatarBtn").classList.remove("visible");
      }
    }

    // ── Load profile ───────────────────────────────────────────────────────
    async function loadProfile() {
      try {
        const res  = await authFetch("/api/auth/me");
        const data = await res.json();
        if (data.user) renderUser(data.user);
      } catch (e) {
        console.error("[loadProfile]", e.message);
      }
    }

    // ── Avatar file pick ───────────────────────────────────────────────────
    document.getElementById("avatarInput").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        showToast("Image must be under 2 MB", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        pendingAvatar = dataUrl;

        // Preview in hero
        document.getElementById("heroAvatar").innerHTML =
          `<img src="${dataUrl}" alt="Preview" />`;

        // Preview in thumb
        const thumb = document.getElementById("avatarThumb");
        thumb.innerHTML = `<img src="${dataUrl}" alt="" />`;
        document.getElementById("removeAvatarBtn").classList.add("visible");
      };
      reader.readAsDataURL(file);
    });

    function removeAvatar() {
      pendingAvatar = null; // signal: send null to backend = clear
      document.getElementById("heroAvatar").innerHTML =
        `<i class="fa-solid fa-user-doctor"></i>`;
      document.getElementById("avatarThumb").innerHTML =
        `<i class="fa-solid fa-user-doctor"></i>`;
      document.getElementById("removeAvatarBtn").classList.remove("visible");
    }

    // ── Info edit toggle ───────────────────────────────────────────────────
    function toggleInfoEdit() {
      const form    = document.getElementById("infoForm");
      const view    = document.getElementById("infoView");
      const avatarR = document.getElementById("avatarRow");
      const btn     = document.getElementById("infoEditToggle");
      const open    = form.classList.contains("open");

      if (open) {
        cancelInfoEdit();
      } else {
        form.classList.add("open");
        avatarR.style.display = "flex";
        view.style.display    = "none";
        btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel';
        pendingAvatar = undefined;
        // Re-fill inputs with latest data
        if (currentUser) {
          document.getElementById("inputName").value  = currentUser.name  || "";
          document.getElementById("inputEmail").value = currentUser.email || "";
        }
      }
    }

    function cancelInfoEdit() {
      document.getElementById("infoForm").classList.remove("open");
      document.getElementById("avatarRow").style.display = "none";
      document.getElementById("infoView").style.display  = "";
      document.getElementById("infoEditToggle").innerHTML = '<i class="fa-solid fa-pen"></i> Edit';
      clearFieldErrs(["inputName","nameErr"],["inputEmail","emailErr"]);
      pendingAvatar = undefined;
      // Reset avatar preview back to actual saved state
      if (currentUser) renderUser(currentUser);
    }

    // ── Save profile info ──────────────────────────────────────────────────
    async function saveProfile() {
      clearFieldErrs(["inputName","nameErr"],["inputEmail","emailErr"]);

      const name  = document.getElementById("inputName").value.trim();
      const email = document.getElementById("inputEmail").value.trim();
      let valid   = true;

      if (!name || name.length < 2) {
        setFieldErr("inputName", "nameErr", "Name must be at least 2 characters");
        valid = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldErr("inputEmail", "emailErr", "Enter a valid email address");
        valid = false;
      }
      if (!valid) return;

      const body = { name, email };
      if (pendingAvatar !== undefined) body.profileImage = pendingAvatar;

      const btn = document.getElementById("infoSaveBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';

      try {
        const res  = await authFetch("/api/auth/update", {
          method: "PUT",
          body:   JSON.stringify(body),
        });
        const data = await res.json();

        if (res.ok) {
          renderUser(data.user);
          cancelInfoEdit();
          showToast("Profile updated successfully");
        } else if (data.fields) {
          if (data.fields.name)  setFieldErr("inputName",  "nameErr",  data.fields.name);
          if (data.fields.email) setFieldErr("inputEmail", "emailErr", data.fields.email);
        } else {
          showToast(data.error || "Something went wrong", "error");
        }
      } catch (e) {
        showToast("Cannot reach the server", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Save Changes';
      }
    }

    // ── Password edit toggle ───────────────────────────────────────────────
    function togglePwEdit() {
      const form = document.getElementById("pwForm");
      const btn  = document.getElementById("pwEditToggle");
      const open = form.classList.contains("open");

      if (open) {
        cancelPwEdit();
      } else {
        form.classList.add("open");
        document.getElementById("pwView").style.display = "none";
        btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel';
      }
    }

    function cancelPwEdit() {
      const form = document.getElementById("pwForm");
      form.classList.remove("open");
      document.getElementById("pwView").style.display = "";
      document.getElementById("pwEditToggle").innerHTML = '<i class="fa-solid fa-pen"></i> Change';
      ["inputCurrentPw","inputNewPw","inputConfirmPw"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("pwStrengthWrap").style.display = "none";
      clearFieldErrs(
        ["inputCurrentPw","currentPwErr"],
        ["inputNewPw","newPwErr"],
        ["inputConfirmPw","confirmPwErr"]
      );
    }

    // ── Password strength ──────────────────────────────────────────────────
    function updateStrength(v) {
      const wrap = document.getElementById("pwStrengthWrap");
      const fill = document.getElementById("pwStrengthFill");
      const lbl  = document.getElementById("pwStrengthLabel");
      if (!v) { wrap.style.display = "none"; return; }
      wrap.style.display = "block";
      let score = 0;
      if (v.length >= 8)            score++;
      if (v.length >= 12)           score++;
      if (/[A-Z]/.test(v))          score++;
      if (/[0-9]/.test(v))          score++;
      if (/[^A-Za-z0-9]/.test(v))   score++;
      const levels = [
        { pct:"20%", color:"#e05c5c", label:"Too weak" },
        { pct:"40%", color:"#e09a3c", label:"Weak"     },
        { pct:"60%", color:"#e0c83c", label:"Fair"     },
        { pct:"80%", color:"#3dab6e", label:"Good"     },
        { pct:"100%",color:"#3dab6e", label:"Strong"   },
      ];
      const l = levels[Math.min(score, 4)];
      fill.style.width      = l.pct;
      fill.style.background = l.color;
      lbl.style.color       = l.color;
      lbl.textContent       = l.label;
    }

    // ── Toggle password visibility ─────────────────────────────────────────
    function togglePw(inputId, iconId) {
      const inp  = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      const show = inp.type === "password";
      inp.type   = show ? "text" : "password";
      icon.className = show ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
    }

    // ── Save password ──────────────────────────────────────────────────────
    async function savePassword() {
      clearFieldErrs(
        ["inputCurrentPw","currentPwErr"],
        ["inputNewPw","newPwErr"],
        ["inputConfirmPw","confirmPwErr"]
      );

      const currentPassword = document.getElementById("inputCurrentPw").value;
      const newPassword     = document.getElementById("inputNewPw").value;
      const confirmPassword = document.getElementById("inputConfirmPw").value;
      let valid = true;

      if (!currentPassword) {
        setFieldErr("inputCurrentPw","currentPwErr","Current password is required"); valid = false;
      }
      if (!newPassword || newPassword.length < 8) {
        setFieldErr("inputNewPw","newPwErr","Password must be at least 8 characters"); valid = false;
      } else if (!/[A-Za-z]/.test(newPassword) || !/\d/.test(newPassword)) {
        setFieldErr("inputNewPw","newPwErr","Must contain a letter and a number"); valid = false;
      }
      if (!confirmPassword) {
        setFieldErr("inputConfirmPw","confirmPwErr","Please confirm your new password"); valid = false;
      } else if (confirmPassword !== newPassword) {
        setFieldErr("inputConfirmPw","confirmPwErr","Passwords do not match"); valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById("pwSaveBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating…';

      try {
        const res  = await authFetch("/api/auth/update", {
          method: "PUT",
          body:   JSON.stringify({ currentPassword, newPassword }),
        });
        const data = await res.json();

        if (res.ok) {
          cancelPwEdit();
          showToast("Password updated successfully");
        } else if (data.fields) {
          if (data.fields.currentPassword)
            setFieldErr("inputCurrentPw","currentPwErr", data.fields.currentPassword);
          if (data.fields.newPassword)
            setFieldErr("inputNewPw","newPwErr", data.fields.newPassword);
        } else {
          showToast(data.error || "Something went wrong", "error");
        }
      } catch (e) {
        showToast("Cannot reach the server", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Update Password';
      }
    }

    // ── Sidebar collapse ───────────────────────────────────────────────────
    document.getElementById("sidebarToggle")?.addEventListener("click", () => {
      document.getElementById("sidebar")?.classList.toggle("collapsed");
    });

    // ── Init ───────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", loadProfile);
  </script>
</body>
</html>
